services:
  postgres:
    image: postgres:16-alpine          # alpine = imagen más ligera y segura
    container_name: PostgresSeQ
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seq_db}
      POSTGRES_USER: ${POSTGRES_USER:-seq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?La variable POSTGRES_PASSWORD es obligatoria}

    ports:
      - "127.0.0.1:15432:5432"          # solo accesible desde localhost, NO expuesto públicamente

    volumes:
      - postgres_data:/var/lib/postgresql/data    # datos persistentes
      - ./init:/docker-entrypoint-initdb.d:ro     # scripts SQL ejecutados al crear la BD

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seq_user} -d ${POSTGRES_DB:-seq_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # Seguridad: ejecuta como usuario no-root
    # user: "999:999"

    # Parámetros de rendimiento de PostgreSQL
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c log_min_duration_statement=200

volumes:
  postgres_data:
    driver: local