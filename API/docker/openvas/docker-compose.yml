version: '3.9'

services:
  openvas:
    image: immauss/openvas:latest
    container_name: openvas
    restart: unless-stopped
    ports:
      - "9392:9392"
      - "9390:9390"
    volumes:
      - openvas-data:/data
    environment:
      - PASSWORD=admin123
      - SKIPSYNC=true  # Desactiva sincronización automática inicial
    dns:
      - 8.8.8.8        # Google DNS
      - 1.1.1.1        # Cloudflare DNS
      - 208.67.222.222 # OpenDNS
    cap_add:
      - NET_ADMIN

volumes:
  openvas-data:
