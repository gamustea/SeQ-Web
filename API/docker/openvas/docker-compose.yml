services:
  openvas:
    image: immauss/openvas:latest
    container_name: openvas
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined
    ports:
      - "9392:9392"
      - "9390:9390"
    environment:
      - FEED_SYNC=true
    volumes:
      - openvas_data:/data
    shm_size: '512mb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9392"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 300s

volumes:
  openvas_data: