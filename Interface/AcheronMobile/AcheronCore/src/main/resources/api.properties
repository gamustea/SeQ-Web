# ============================================================
#  SeQ API ? Configuraciµn de endpoints
#  Dominio: api.seq.com
#  OAuth 2.0: JWT (HS256) + Refresh Token opaco
# ============================================================

api.base-url=https://api.seq.com/v1

# ------------------------------------------------------------
#  Auth ? OAuth 2.0
# ------------------------------------------------------------
# Login: devuelve access_token (JWT) + refresh_token (opaco)
api.url.auth.login=${api.base-url}/auth/login

# Renovar access_token a partir de un refresh_token vÃlido
api.url.auth.refresh=${api.base-url}/auth/refresh

# Revocar el access_token del usuario autenticado (logout)
api.url.auth.logout=${api.base-url}/auth/logout

# Revocar todos los tokens de un usuario (logout global)
api.url.auth.revoke-all=${api.base-url}/auth/revoke-all

# ------------------------------------------------------------
#  Vault (Acheron)
# ------------------------------------------------------------
# GET    /acheron/vault           ? obtener vault del usuario
# PUT    /acheron/vault           ? guardar/actualizar vault
# DELETE /acheron/vault           ? eliminar vault
# POST   /acheron/vault/restore   ? restaurar desde backup
api.url.vault.get=${api.base-url}/acheron/vault
api.url.vault.save=${api.base-url}/acheron/vault
api.url.vault.delete=${api.base-url}/acheron/vault
api.url.vault.restore=${api.base-url}/acheron/vault/restore

# ------------------------------------------------------------
#  Usuarios (Acheron)
# ------------------------------------------------------------
# POST   /acheron/users/register  ? registrar persona + usuario
# GET    /acheron/users/me        ? datos del usuario autenticado
# PUT    /acheron/users/me        ? actualizar datos
# DELETE /acheron/users/me        ? eliminar cuenta
# PUT    /acheron/users/me/password ? cambiar contraseþa
api.url.user.register=${api.base-url}/acheron/users/register
api.url.user.me=${api.base-url}/acheron/users/me
api.url.user.password=${api.base-url}/acheron/users/me/password

# ------------------------------------------------------------
#  Escaneos Sentinel (referencia)
# ------------------------------------------------------------
api.url.scan.nmap.run=${api.base-url}/sentinel/scans/nmap
api.url.scan.nikto.run=${api.base-url}/sentinel/scans/nikto
api.url.scan.openvas.run=${api.base-url}/sentinel/scans/openvas
api.url.scan.status=${api.base-url}/sentinel/scans/{id}/status
api.url.scan.cancel=${api.base-url}/sentinel/scans/{id}/cancel
api.url.scan.delete=${api.base-url}/sentinel/scans/{id}
api.url.scan.results=${api.base-url}/sentinel/scans/{id}/results

# ------------------------------------------------------------
#  Timeouts
# ------------------------------------------------------------
api.timeout.connect=5000
api.timeout.read=15000
