  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis — Píldoras de Concienciación</title>
  <link rel="stylesheet" href="aegis.css" />
</head>
<body>
<div class="layout">

  <!-- ── TOPBAR ── -->
  <nav class="topbar">
    <div class="topbar-left">
      <a href="../hub/index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Hub
      </a>
      <span class="topbar-sep">·</span>
      <span class="topbar-title">Aegis</span>
      <span class="topbar-badge">Píldoras</span>
    </div>
    <div class="topbar-right">
      <div class="session-pill">
        <div class="session-dot"></div>
        <span id="session-user"></span>
      </div>
      <button class="btn-logout-top" id="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </nav>

  <!-- ── APP LAYOUT ── -->
  <div class="app-layout">

    <!-- ══ PANEL IZQUIERDO ══ -->
    <aside class="panel panel--left">
      <div class="panel__section">

        <h2 class="panel__title">
          <span class="panel__step">01</span>
          Nueva Píldora
        </h2>

        <!-- Formulario de configuración -->
        <div class="tweaks-form">
          <label class="form-field">
            <span class="form-field__label">Empresa</span>
            <input id="input-company" class="form-field__input" type="text"
                   placeholder="Nombre de la empresa" maxlength="60" />
          </label>

          <div class="form-row">
            <label class="form-field">
              <span class="form-field__label">Idioma</span>
              <select id="input-language" class="form-field__input">
                <option value="es" selected>Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
              </select>
            </label>
            <label class="form-field">
              <span class="form-field__label">Tono</span>
              <select id="input-tone" class="form-field__input">
                <option value="profesional" selected>Profesional</option>
                <option value="formal">Formal</option>
                <option value="cercano">Cercano</option>
                <option value="técnico">Técnico</option>
              </select>
            </label>
          </div>

          <div class="form-row">
            <label class="form-field">
              <span class="form-field__label">Audiencia</span>
              <select id="input-audience" class="form-field__input">
                <option value="mixed" selected>Mixta</option>
                <option value="technical">Técnica</option>
                <option value="non-technical">No técnica</option>
              </select>
            </label>
            <label class="form-field">
              <span class="form-field__label">Sector</span>
              <input id="input-sector" class="form-field__input" type="text"
                     placeholder="p.ej. finanzas" maxlength="40" />
            </label>
          </div>

          <label class="form-field">
            <span class="form-field__label">Email de contacto</span>
            <input id="input-contact" class="form-field__input" type="email"
                   placeholder="seguridad@empresa.com" maxlength="100" />
          </label>

          <label class="form-field">
            <span class="form-field__label">Marcas asociadas <small>(separadas por coma)</small></span>
            <input id="input-brands" class="form-field__input" type="text"
                   placeholder="Microsoft, Cisco, Adobe…" maxlength="200" />
          </label>

          <label class="form-field">
            <span class="form-field__label">Enfoque específico <small>(opcional)</small></span>
            <input id="input-focus" class="form-field__input" type="text"
                   placeholder="p.ej. phishing por QR" maxlength="120" />
          </label>
        </div>

        <!-- Selector de temas -->
        <p class="panel__subtitle">Selecciona un tema</p>
        <div id="topic-grid" class="topic-grid" role="list">
          <!-- skeleton por defecto -->
          <div class="topic-skeleton"></div>
          <div class="topic-skeleton"></div>
          <div class="topic-skeleton"></div>
          <div class="topic-skeleton"></div>
        </div>

        <!-- Progreso -->
        <div id="progress-block" class="progress-block" style="display:none">
          <div class="progress-bar-track">
            <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
          </div>
          <p id="progress-text" class="progress-text">Iniciando generación…</p>
        </div>

        <!-- Botón generar -->
        <button id="btn-generate" class="btn btn--primary btn--full" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Generar Píldora
        </button>

      </div>
    </aside>

    <!-- ══ PANEL CENTRAL (VIEWER) ══ -->
    <section class="panel panel--viewer" aria-label="Contenido de la píldora">
      <div id="viewer-empty" class="viewer-empty">
        <div class="viewer-empty__icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="4" width="16" height="16" rx="3"/>
            <path d="M8 10h8M8 14h5" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="viewer-empty__text">Selecciona un tema y genera<br/>tu primera píldora</p>
      </div>
      <div id="viewer-content" class="viewer-content" style="display:none"></div>
    </section>

    <!-- ══ PANEL DERECHO (HISTORIAL) ══ -->
    <aside class="panel panel--right">
      <div class="panel__section">
        <div class="panel__title-row">
          <h2 class="panel__title">
            <span class="panel__step">02</span>
            Historial
            <span id="history-count" class="history-count"></span>
          </h2>
          <select id="sort-select" class="sort-select" aria-label="Ordenar historial">
            <option value="date-desc">Más reciente</option>
            <option value="date-asc">Más antiguo</option>
            <option value="name-asc">A–Z</option>
            <option value="status">Estado</option>
          </select>
        </div>
        <div id="history-list" class="history-list" role="list">
          <p id="history-empty" class="viewer-empty__text">Sin documentos aún</p>
        </div>
      </div>
    </aside>

  </div><!-- /.app-layout -->

</div><!-- /.layout -->

<!-- ── TOAST ── -->
<div id="toast" class="toast" role="alert" aria-live="assertive"></div>

<script src="aegis.js"></script>
</body>
</html>
