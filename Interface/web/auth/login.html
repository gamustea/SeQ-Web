<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecOps — Inicio de sesión</title>
  <link rel="stylesheet" href="/auth/login.css" />
</head>
<body>

<main class="card" role="main">

  <div class="logo-wrap">
    <img src="/shared/resources/images/SecOps-Logo-BlueDark.png" alt="SecOps Logo" />
  </div>

  <h1 class="card-title">Bienvenido a SecOps</h1>
  <p class="card-subtitle">Introduce tus credenciales para acceder a la plataforma</p>

  <div id="alert" class="alert" role="alert" aria-live="assertive"></div>

  <form id="login-form" novalidate>
    <div class="form-group">
      <label for="username">Usuario</label>
      <div class="input-wrap">
        <input type="text" id="username" name="username"
               placeholder="nombre_de_usuario" autocomplete="username" required />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required />
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostrar/ocultar contraseña">
          <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btn-submit">
      <span class="btn-text">Iniciar sesión</span>
      <span class="spinner" aria-hidden="true"></span>
    </button>
  </form>

  <footer class="card-footer">
    SecOps &copy; 2025 — Sistema de escaneo de seguridad
  </footer>

</main>

<script>
  /* ============================================================
     CONFIG
  ============================================================ */
  const API_BASE  = '';
  const HUB_URL   = '/hub/index.html';

  /* ============================================================
     TOKEN STORE (in-memory durante la sesión del login)
     Tras el login exitoso los tokens se pasan al hub via
     sessionStorage con clave 'seq_session' y se borran
     de memoria inmediatamente después de la redirección.
  ============================================================ */
  const TokenStore = (() => {
    let _access  = null;
    let _refresh = null;
    let _exp     = null;

    return {
      save(a, r, expiresIn) { _access = a; _refresh = r; _exp = Date.now() + expiresIn * 1000; },
      clear()              { _access = null; _refresh = null; _exp = null; },
      getAccess()          { return _access; },
      getRefresh()         { return _refresh; },
      expiresAt()          { return _exp; },
      hasSession()         { return !!_access; },

      /* Persiste la sesión en sessionStorage y redirige */
      persist(redirectUrl) {
        sessionStorage.setItem('seq_session', JSON.stringify({
          accessToken:  _access,
          refreshToken: _refresh,
          expiresAt:    _exp
        }));
        this.clear();
        window.location.href = redirectUrl;
      }
    };
  })();

  /* ============================================================
     DOM
  ============================================================ */
  const form          = document.getElementById('login-form');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const btnSubmit     = document.getElementById('btn-submit');
  const alertEl       = document.getElementById('alert');
  const togglePwBtn   = document.getElementById('toggle-pw');
  const iconEye       = document.getElementById('icon-eye');
  const iconEyeOff    = document.getElementById('icon-eye-off');

  /* ============================================================
     TOGGLE PASSWORD
  ============================================================ */
  togglePwBtn.addEventListener('click', () => {
    const show = passwordInput.type === 'password';
    passwordInput.type       = show ? 'text'  : 'password';
    iconEye.style.display    = show ? 'none'  : 'block';
    iconEyeOff.style.display = show ? 'block' : 'none';
  });

  /* ============================================================
     ALERTS
  ============================================================ */
  function showAlert(msg, type = 'error') {
    const isErr = type === 'error';
    alertEl.className = `alert ${isErr ? 'alert-error' : 'alert-success'}`;
    alertEl.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        ${isErr
          ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
          : '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
        }
      </svg>
      <span>${msg}</span>`;
    alertEl.classList.add('visible');
  }
  function hideAlert() { alertEl.classList.remove('visible'); }

  /* ============================================================
     LOADING
  ============================================================ */
  function setLoading(on) {
    btnSubmit.disabled = on;
    btnSubmit.classList.toggle('loading', on);
    usernameInput.disabled = on;
    passwordInput.disabled = on;
  }

  function markError(input) {
    input.classList.add('input-error');
    input.addEventListener('input', () => input.classList.remove('input-error'), { once: true });
  }

  /* ============================================================
     VALIDATION
  ============================================================ */
  function validate(username, password) {
    if (!username.trim()) {
      showAlert('El nombre de usuario es obligatorio.');
      markError(usernameInput); usernameInput.focus(); return false;
    }
    if (!password) {
      showAlert('La contraseña es obligatoria.');
      markError(passwordInput); passwordInput.focus(); return false;
    }
    return true;
  }

  /* ============================================================
     API: LOGIN
  ============================================================ */
  async function login(username, password) {
    const res  = await fetch(`${API_BASE}/oauth/token`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ grantType: 'password', username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) throw new Error('Credenciales incorrectas. Verifica tu usuario y contraseña.');
      if (res.status === 400) throw new Error(data.error_description || 'Solicitud inválida.');
      if (res.status === 429) throw new Error('Demasiados intentos. Espera unos minutos e inténtalo de nuevo.');
      throw new Error(data.error_description || `Error del servidor (${res.status}).`);
    }
    return data; // { access_token, refresh_token, expires_in }
  }

  /* ============================================================
     SUBMIT
  ============================================================ */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const username = usernameInput.value;
    const password = passwordInput.value;
    if (!validate(username, password)) return;

    setLoading(true);
    try {
      const data = await login(username, password);
      TokenStore.save(data.access_token, data.refresh_token, data.expires_in);

      showAlert('Sesión iniciada. Redirigiendo…', 'success');
      setTimeout(() => TokenStore.persist(HUB_URL), 800);

    } catch (err) {
      showAlert(err.message || 'Error desconocido. Inténtalo de nuevo.');
      if (err.message?.includes('Credenciales')) {
        markError(usernameInput); markError(passwordInput);
        passwordInput.value = '';
        passwordInput.focus();
      }
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
