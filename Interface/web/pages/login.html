<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecOps — Inicio de sesión</title>
  <link rel="stylesheet" href="/resources/css/shared.css" />
  <link rel="stylesheet" href="/resources/css/login.css" />
  <link rel="icon" type="image/png" href="/resources/images/favicon.ico" />
</head>
<body>

<main class="card" role="main">

  <div class="logo-wrap">
    <img src="/resources/images/SecOps-Logo-BlueDark.png" alt="SecOps Logo" />
  </div>

  <h1 class="card-title">Bienvenido a SecOps</h1>
  <p class="card-subtitle">Introduce tus credenciales para acceder a la plataforma</p>

  <div id="alert" class="alert" role="alert" aria-live="assertive"></div>

  <form id="login-form" novalidate>
    <div class="form-group">
      <label for="username">Usuario</label>
      <div class="input-wrap">
        <input type="text" id="username" name="username"
               placeholder="nombre_de_usuario" autocomplete="username" required />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required />
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostrar/ocultar contraseña">
          <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btn-submit">
      <span class="btn-text">Iniciar sesión</span>
      <span class="spinner" aria-hidden="true"></span>
    </button>
  </form>

  <footer class="card-footer">
    SecOps &copy; 2025 — Sistema de escaneo de seguridad
  </footer>

</main>

<script src="/resources/js/login.js"></script>
</body>
</html>
