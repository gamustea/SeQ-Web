services:

  postgres:
    image: postgres:16-alpine
    container_name: PostgresSeQ
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c log_min_duration_statement=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-SecOps} -d $${POSTGRES_DB:-SeQ}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - secops-net
    profiles:
      - dev
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    container_name: OllamaSeQ
    env_file:
      - .env
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - secops-net
    profiles:
      - dev
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: RedisSeQ
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping || redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - secops-net
    profiles:
      - dev
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openvas:
    image: immauss/openvas:latest
    container_name: openvas
    restart: unless-stopped
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "127.0.0.1:9392:9392"
      - "127.0.0.1:9390:9390"
    environment:
      USERNAME: ${OPENVAS_USERNAME}
      PASSWORD: ${OPENVAS_PASSWORD}
      FEED_SYNC: "true"
    volumes:
      - openvas_data:/data
    shm_size: "1gb"
    healthcheck:
      disable: true          # <- anula el HEALTHCHECK del Dockerfile
    networks:
      - secops-net
    profiles:
      - dev
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  seq:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: SeQ-API
    restart: unless-stopped
    # traceroute (y el chequeo ICMP de alcanzabilidad) necesitan raw sockets
    # para leer las respuestas ICMP TTL-exceeded.
    cap_add:
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      openvas:
        condition: service_started
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OLLAMA_HOST: http://ollama:11434
      OPENVAS_HOST: openvas
      TEMP_DIR: /app/temp
      LOG_DIR: /app/logs
      OUTPUT_DIR: /app/data
    volumes:
      - seq_data:/app/data
      - scan_temp:/app/temp
      - scan_logs:/app/logs
    networks:
      - secops-net
    profiles:
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  seq-worker:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: SeQ-Worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openvas:
        condition: service_started
    command: python -m src.modules.system.taskqueue.worker
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OLLAMA_HOST: http://ollama:11434
      OPENVAS_HOST: openvas
      TEMP_DIR: /app/temp
      LOG_DIR: /app/logs
      OUTPUT_DIR: /app/data
    volumes:
      - seq_data:/app/data
      - scan_temp:/app/temp
      - scan_logs:/app/logs
    networks:
      - secops-net
    profiles:
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: SeQ-Web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - seq
    networks:
      - secops-net
    profiles:
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
  ollama_models:
  openvas_data:
  seq_data:
  scan_temp:
  scan_logs:

networks:
  secops-net:
    driver: bridge
