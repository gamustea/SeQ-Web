services:

  seq:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: SeQ-API
    restart: unless-stopped
    env_file:
      - API/.env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      OLLAMA_HOST: http://ollama:11434
      OPENVAS_HOST: openvas
    volumes:
      - seq_data:/app/data
      - scan_temp:/app/temp
      - scan_logs:/app/logs
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - secops-net

  web:
    build:
      context: ./Interface/web
      dockerfile: Dockerfile
    container_name: SeQ-Web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - seq
    networks:
      - secops-net

  postgres:
    image: postgres:16-alpine
    container_name: PostgresSeQ
    restart: unless-stopped
    env_file:
      - API/.env
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seq_user} -d ${POSTGRES_DB:-seq_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c log_min_duration_statement=200
    networks:
      - secops-net

  ollama:
    image: ollama/ollama:latest
    container_name: OllamaSeQ
    env_file:
      - API/.env
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve & 
      sleep 15; 
      echo 'Verificando modelo '$$OLLAMA_MODEL'...'; 
      ollama list | grep -q $$OLLAMA_MODEL && echo 'El modelo se ha verificado correctamente, y existe en el contenedor actual; no se instalará ningun modelo adicional' 
      || (echo 'Descargando modelo $$OLLAMA_MODEL...' && ollama pull $$OLLAMA_MODEL); 
      wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q $${OLLAMA_MODEL}"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - secops-net

  openvas:
    image: immauss/openvas:latest
    container_name: openvas
    restart: unless-stopped
    env_file:
      - API/.env
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined
    ports:
      - "9392:9392"
      - "9390:9390"
    environment:
      - FEED_SYNC=true
    volumes:
      - openvas_data:/data
    shm_size: "512mb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9392"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 900s
    networks:
      - secops-net

volumes:
  postgres_data:
    driver: local
  ollama_models:
  openvas_data:
  seq_data:
  scan_temp:
  scan_logs:

networks:
  secops-net:
    driver: bridge