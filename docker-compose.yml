services:

  postgres:
    image: postgres:16-alpine
    container_name: PostgresSeQ
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c log_min_duration_statement=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-SecOps} -d $${POSTGRES_DB:-SeQ}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - secops-net
    profiles:
      - dev
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    container_name: OllamaSeQ
    env_file:
      - .env
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - secops-net
    profiles:
      - dev
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openvas:
    image: immauss/openvas:latest
    container_name: openvas
    restart: unless-stopped
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "127.0.0.1:9392:9392"
      - "127.0.0.1:9390:9390"
    environment:
      USERNAME: ${OPENVAS_USERNAME}
      PASSWORD: ${OPENVAS_PASSWORD}
      FEED_SYNC: "true"
    volumes:
      - openvas_data:/data
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9392"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 900s
    networks:
      - secops-net
    profiles:
      - dev
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  seq:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: SeQ-API
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      openvas:
        condition: service_started
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      OLLAMA_HOST: http://ollama:11434
      OPENVAS_HOST: openvas
      TEMP_DIR: /app/temp
      LOG_DIR: /app/logs
      OUTPUT_DIR: /app/data
      RESOURCE_DIR: /app/resources
    volumes:
      - seq_data:/app/data
      - scan_temp:/app/temp
      - scan_logs:/app/logs
    networks:
      - secops-net
    profiles:
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: SeQ-Web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - seq
    networks:
      - secops-net
    profiles:
      - container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  ollama_models:
  openvas_data:
  seq_data:
  scan_temp:
  scan_logs:

networks:
  secops-net:
    driver: bridge
