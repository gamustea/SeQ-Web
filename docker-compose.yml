version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: seq-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-SecOps}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xK#9mP2$vQnL@7rTdZ!4}
      POSTGRES_DB: ${DB_NAME:-SeQ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - seq-network

  api:
    build: .
    container_name: seq-api
    depends_on:
      - postgres
    environment:
      - DB_USER=${DB_USER:-SecOps}
      - DB_PASSWORD=${DB_PASSWORD:-xK#9mP2$vQnL@7rTdZ!4}
      - DB_NAME=${DB_NAME:-SeQ}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    networks:
      - seq-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  seq-network:
    driver: bridge