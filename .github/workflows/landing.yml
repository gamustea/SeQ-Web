# Sync the landing site sources in landing/ to the root of the
# gh-pages branch, which GitHub Pages serves at
# https://gamustea.github.io/SeQ
#
# Keeps landing as reviewable source on the default branch and
# gh-pages as a thin publishing branch with only rendered files.
#
# Setup (one-time, manual):
#   1. Repo → Settings → Pages
#   2. Source: Deploy from a branch
#   3. Branch: `gh-pages` → folder `/ (root)`
#   4. Save
# The previous API-docs workflows (static.yml, sync-docs.yml) are
# disabled (workflow_dispatch only) and no longer auto-run.
name: Sync landing to gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/landing.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-gh-pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure bot
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Sync landing/ to gh-pages root
        run: |
          set -euo pipefail

          # Bootstrap gh-pages on origin if it does not exist yet.
          if ! git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            echo "Initializing gh-pages orphan branch…"
            git checkout --orphan gh-pages
            git rm -rf . -q
            git commit --allow-empty -m "docs(landing): initialize gh-pages"
            git push origin gh-pages
            git checkout -
          fi

          # Build a throwaway branch off origin/gh-pages, replace its content.
          git checkout --force -B gh-pages-work origin/gh-pages
          git rm -rf . -q
          # Drop any untracked leftovers from the parent checkout
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name 'landing' \
            ! -name '.github' \
            -exec rm -rf {} +
          # Copy landing/* to root; remove landing/ and .github/ from the tree
          cp -a landing/. .
          rm -rf landing .github

          git add -A
          SHA=$(git rev-parse --short "$GITHUB_SHA")
          if git diff --staged --quiet HEAD; then
            echo "No changes — gh-pages already in sync"
            exit 0
          fi
          git commit --allow-empty -m "docs(landing): sync from landing/ @ ${SHA}"
          git push origin HEAD:gh-pages --force-with-lease
          echo "::notice::gh-pages updated from ${SHA}"

      - name: Cleanup work branches
        if: always()
        run: |
          git checkout main 2>/dev/null || true
          git branch -D gh-pages-work 2>/dev/null || true