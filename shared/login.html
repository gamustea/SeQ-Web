<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecOps — Inicio de sesión</title>
  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark:        #0d1117;
      --bg-card:        #161b22;
      --bg-input:       #0d1117;
      --border:         #30363d;
      --border-focus:   #3b82f6;
      --text-primary:   #e6edf3;
      --text-secondary: #8b949e;
      --accent:         #3b82f6;
      --accent-hover:   #2563eb;
      --error-bg:       rgba(248, 81, 73, 0.12);
      --error-border:   #f85149;
      --error-text:     #f85149;
      --success-bg:     rgba(35, 197, 94, 0.12);
      --success-border: #23c55e;
      --success-text:   #23c55e;
      --radius:         10px;
      --transition:     0.2s ease;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(59, 130, 246, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(99, 102, 241, 0.05) 0%, transparent 60%);
    }

    /* ============================================================
       CARD
    ============================================================ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       LOGO
    ============================================================ */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .logo-wrap img {
      height: 72px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.3));
    }

    /* ============================================================
       HEADINGS
    ============================================================ */
    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
      letter-spacing: -0.02em;
    }

    .card-subtitle {
      font-size: 0.85rem;
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    /* ============================================================
       FORM
    ============================================================ */
    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrap {
      position: relative;
    }

    input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 0.95rem;
      padding: 0.65rem 2.75rem 0.65rem 0.9rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    input.input-error {
      border-color: var(--error-border);
      box-shadow: 0 0 0 3px rgba(248, 81, 73, 0.14);
    }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      transition: color var(--transition);
    }

    .toggle-pw:hover { color: var(--text-primary); }

    /* ============================================================
       ALERTS
    ============================================================ */
    .alert {
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .alert.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .alert-error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    .alert-success {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success-text);
    }

    .alert svg { flex-shrink: 0; margin-top: 1px; }

    /* ============================================================
       BUTTON
    ============================================================ */
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .card-footer {
      margin-top: 1.75rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    /* ============================================================
       SESSION INFO (post-login)
    ============================================================ */
    .session-info {
      display: none;
      margin-top: 1.5rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .session-info.visible { display: block; }

    .session-info .token-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
      gap: 0.5rem;
    }

    .session-info .token-label {
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .session-info .token-value {
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
      color: var(--accent);
    }

    /* ============================================================
       LOGOUT BUTTON
    ============================================================ */
    .btn-logout {
      display: none;
      width: 100%;
      background: transparent;
      color: var(--error-text);
      border: 1px solid var(--error-border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.6rem 1rem;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background var(--transition), transform var(--transition);
    }

    .btn-logout:hover {
      background: var(--error-bg);
      transform: translateY(-1px);
    }

    .btn-logout.visible { display: block; }
  </style>
</head>
<body>

<main class="card" role="main">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img
      id="app-logo"
      src="../shared/resources/images/SecOps-Logo-BlueDark.png"
      alt="SecOps Logo"
    />
  </div>

  <!-- HEADINGS -->
  <h1 class="card-title">Bienvenido a SecOps</h1>
  <p class="card-subtitle">Introduce tus credenciales para acceder a la plataforma</p>

  <!-- ALERT -->
  <div id="alert" class="alert" role="alert" aria-live="assertive"></div>

  <!-- LOGIN FORM -->
  <form id="login-form" novalidate>

    <!-- Username -->
    <div class="form-group">
      <label for="username">Usuario</label>
      <div class="input-wrap">
        <input
          type="text"
          id="username"
          name="username"
          placeholder="nombre_de_usuario"
          autocomplete="username"
          required
        />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
        <button
          type="button"
          class="toggle-pw"
          id="toggle-pw"
          aria-label="Mostrar/ocultar contraseña"
        >
          <!-- Eye icon -->
          <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Eye-off icon (hidden by default) -->
          <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               style="display:none">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1
                     5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1
                     -2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-login" id="btn-submit">
      <span class="btn-text">Iniciar sesión</span>
      <span class="spinner" aria-hidden="true"></span>
    </button>

  </form>

  <!-- SESSION INFO (visible post-login) -->
  <div class="session-info" id="session-info">
    <div class="token-row">
      <span class="token-label">Access token</span>
      <span class="token-value" id="display-access">—</span>
    </div>
    <div class="token-row">
      <span class="token-label">Refresh token</span>
      <span class="token-value" id="display-refresh">—</span>
    </div>
    <div class="token-row">
      <span class="token-label">Expira en</span>
      <span class="token-value" id="display-expires">—</span>
    </div>
  </div>

  <!-- LOGOUT -->
  <button type="button" class="btn-logout" id="btn-logout">
    Cerrar sesión
  </button>

  <!-- FOOTER -->
  <footer class="card-footer">
    SecOps &copy; 2025 &mdash; Sistema de escaneo de seguridad
  </footer>

</main>

<script>
  /* ==============================================================
     CONFIG
  ============================================================== */
  const API_BASE = 'http://localhost:5000'; // Cambia si el servidor está en otro host

  /* ==============================================================
     IN-MEMORY TOKEN STORE
     Los tokens NUNCA se escriben en localStorage/sessionStorage.
     Viven únicamente en este closure mientras la página está abierta.
  ============================================================== */
  const TokenStore = (() => {
    let _accessToken  = null;
    let _refreshToken = null;
    let _expiresAt    = null; // timestamp Unix (ms)

    return {
      save(accessToken, refreshToken, expiresIn) {
        _accessToken  = accessToken;
        _refreshToken = refreshToken;
        _expiresAt    = Date.now() + (expiresIn * 1000);
      },

      clear() {
        _accessToken  = null;
        _refreshToken = null;
        _expiresAt    = null;
      },

      getAccessToken()  { return _accessToken; },
      getRefreshToken() { return _refreshToken; },

      isExpired() {
        if (!_expiresAt) return true;
        return Date.now() >= _expiresAt;
      },

      expiresInSeconds() {
        if (!_expiresAt) return 0;
        return Math.max(0, Math.round((_expiresAt - Date.now()) / 1000));
      },

      hasSession() { return !!_accessToken; },

      /**
       * Devuelve el access token válido. Si está a punto de expirar
       * (<60 s) intenta renovarlo con el refresh token.
       */
      async getValidAccessToken() {
        if (!_accessToken) return null;

        // Si queda más de 60 segundos, el token actual es válido
        if (!this.isExpired() && this.expiresInSeconds() > 60) {
          return _accessToken;
        }

        // Intentar refresh
        if (_refreshToken) {
          const renewed = await renewAccessToken(_refreshToken);
          if (renewed) return _accessToken; // ya actualizado por renewAccessToken
        }
        return null;
      }
    };
  })();

  /* ==============================================================
     DOM REFS
  ============================================================== */
  const form          = document.getElementById('login-form');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const btnSubmit     = document.getElementById('btn-submit');
  const btnLogout     = document.getElementById('btn-logout');
  const alertEl       = document.getElementById('alert');
  const sessionInfo   = document.getElementById('session-info');
  const displayAccess  = document.getElementById('display-access');
  const displayRefresh = document.getElementById('display-refresh');
  const displayExpires = document.getElementById('display-expires');
  const togglePwBtn   = document.getElementById('toggle-pw');
  const iconEye       = document.getElementById('icon-eye');
  const iconEyeOff    = document.getElementById('icon-eye-off');

  /* ==============================================================
     TOGGLE PASSWORD VISIBILITY
  ============================================================== */
  togglePwBtn.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    iconEye.style.display    = isPassword ? 'none'  : 'block';
    iconEyeOff.style.display = isPassword ? 'block' : 'none';
  });

  /* ==============================================================
     ALERT HELPERS
  ============================================================== */
  function showAlert(message, type = 'error') {
    const isError = type === 'error';
    alertEl.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
    alertEl.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round">
        ${ isError
          ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
          : '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
        }
      </svg>
      <span>${message}</span>
    `;
    alertEl.classList.add('visible');
  }

  function hideAlert() {
    alertEl.classList.remove('visible');
  }

  /* ==============================================================
     LOADING STATE
  ============================================================== */
  function setLoading(isLoading) {
    btnSubmit.disabled = isLoading;
    btnSubmit.classList.toggle('loading', isLoading);
    usernameInput.disabled = isLoading;
    passwordInput.disabled = isLoading;
  }

  /* ==============================================================
     INPUT ERROR STYLING
  ============================================================== */
  function markInputError(input) {
    input.classList.add('input-error');
    input.addEventListener('input', () => input.classList.remove('input-error'), { once: true });
  }

  /* ==============================================================
     FORM VALIDATION (client-side)
  ============================================================== */
  function validateForm(username, password) {
    if (!username.trim()) {
      showAlert('El nombre de usuario es obligatorio.');
      markInputError(usernameInput);
      usernameInput.focus();
      return false;
    }
    if (!password) {
      showAlert('La contraseña es obligatoria.');
      markInputError(passwordInput);
      passwordInput.focus();
      return false;
    }
    return true;
  }

  /* ==============================================================
     OAUTH: LOGIN
  ============================================================== */
  async function login(username, password) {
    const response = await fetch(`${API_BASE}/oauth/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        grantType: 'password',
        username,
        password
      })
    });

    const data = await response.json();

    if (!response.ok) {
      // Gestión de errores según la API
      if (response.status === 401) {
        throw new Error('Credenciales incorrectas. Verifica tu usuario y contraseña.');
      }
      if (response.status === 400) {
        throw new Error(data.error_description || 'Solicitud inválida.');
      }
      if (response.status === 429) {
        throw new Error('Demasiados intentos. Por favor, espera unos minutos.');
      }
      throw new Error(data.error_description || `Error del servidor (${response.status}).`);
    }

    return data; // { access_token, token_type, expires_in, refresh_token }
  }

  /* ==============================================================
     OAUTH: REFRESH
  ============================================================== */
  async function renewAccessToken(refreshToken) {
    try {
      const response = await fetch(`${API_BASE}/oauth/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          grantType: 'refresh_token',
          refresh_token: refreshToken
        })
      });

      if (!response.ok) return false;

      const data = await response.json();
      // Solo se obtiene un nuevo access_token en el refresh
      TokenStore.save(
        data.access_token,
        TokenStore.getRefreshToken(), // el refresh token no cambia
        data.expires_in
      );
      updateSessionDisplay();
      return true;
    } catch {
      return false;
    }
  }

  /* ==============================================================
     OAUTH: REVOKE (logout)
  ============================================================== */
  async function revokeToken() {
    const token = TokenStore.getAccessToken();
    if (!token) return;

    try {
      await fetch(`${API_BASE}/oauth/revoke`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
    } catch {
      // Si falla la revocación en el servidor, limpiamos igualmente en cliente
    } finally {
      TokenStore.clear();
    }
  }

  /* ==============================================================
     UI: POST-LOGIN
  ============================================================== */
  function truncate(str, maxLen = 28) {
    if (!str) return '—';
    return str.length > maxLen ? str.slice(0, maxLen) + '…' : str;
  }

  function updateSessionDisplay() {
    displayAccess.textContent  = truncate(TokenStore.getAccessToken());
    displayRefresh.textContent = truncate(TokenStore.getRefreshToken());
    displayExpires.textContent = `${TokenStore.expiresInSeconds()} s`;
  }

  function showLoggedInState() {
    form.style.display      = 'none';
    sessionInfo.classList.add('visible');
    btnLogout.classList.add('visible');
    updateSessionDisplay();

    // Actualizar el contador de expiración cada segundo
    const ticker = setInterval(() => {
      if (!TokenStore.hasSession()) { clearInterval(ticker); return; }
      displayExpires.textContent = `${TokenStore.expiresInSeconds()} s`;
    }, 1000);
  }

  function showLoggedOutState() {
    form.style.display = '';
    sessionInfo.classList.remove('visible');
    btnLogout.classList.remove('visible');
    usernameInput.value = '';
    passwordInput.value = '';
    usernameInput.focus();
    hideAlert();
  }

  /* ==============================================================
     EVENT: FORM SUBMIT
  ============================================================== */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const username = usernameInput.value;
    const password = passwordInput.value;

    if (!validateForm(username, password)) return;

    setLoading(true);

    try {
      const data = await login(username, password);

      // ✅ Guardar tokens en memoria
      TokenStore.save(data.access_token, data.refresh_token, data.expires_in);

      showAlert('Sesión iniciada correctamente.', 'success');
      setTimeout(hideAlert, 3000);
      showLoggedInState();

    } catch (err) {
      showAlert(err.message || 'Error desconocido. Inténtalo de nuevo.');

      if (err.message && err.message.includes('Credenciales')) {
        markInputError(usernameInput);
        markInputError(passwordInput);
        passwordInput.value = '';
        passwordInput.focus();
      }
    } finally {
      setLoading(false);
    }
  });

  /* ==============================================================
     EVENT: LOGOUT
  ============================================================== */
  btnLogout.addEventListener('click', async () => {
    await revokeToken();
    showLoggedOutState();
  });

  /* ==============================================================
     EXPOSE: getAuthHeaders (uso externo para peticiones autenticadas)
     Ejemplo: const headers = await getAuthHeaders();
              fetch('/sentinel/results', { headers })
  ============================================================== */
  window.getAuthHeaders = async function () {
    const token = await TokenStore.getValidAccessToken();
    if (!token) throw new Error('No hay sesión activa. Inicia sesión primero.');
    return {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    };
  };

  /* Acceso directo al store desde otros scripts de la app */
  window.SecOpsAuth = TokenStore;
</script>

</body>
</html>
