<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil — SeQ</title>
<link rel="stylesheet" href="/resources/css/shared.css" />
<link rel="stylesheet" href="/resources/css/profile.css" />
<link rel="icon" type="image/png" href="/resources/images/favicon.ico" />
</head>
<body>

<div class="stars" id="stars"></div>

<header class="topbar">
<div class="topbar-left">
<a href="/pages/hub.html" class="back-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M19 12H5M12 19l-7-7 7-7"/>
</svg>
Volver al Hub
</a>
<span class="topbar-sep">/</span>
<span class="topbar-title">Perfil de Usuario</span>
</div>
</header>

<main class="profile-container">
<section class="profile-header">
<img src="/resources/images/default-avatar.svg" alt="Avatar" class="profile-avatar" />
<h1 class="profile-name" id="profile-name">Cargando...</h1>
<p class="profile-username" id="profile-username">@username</p>
</section>

<section class="profile-section">
<h2>Información Personal</h2>
<form id="profile-form">
<div class="form-group">
<label for="first-name">Nombre</label>
<input type="text" id="first-name" name="first_name" required />
</div>
<div class="form-group">
<label for="last-name">Apellidos</label>
<input type="text" id="last-name" name="last_name" required />
</div>
<div class="form-group">
<label for="email">Correo Electrónico</label>
<input type="email" id="email" name="email" disabled />
<small class="form-help">No se puede modificar</small>
</div>
<div class="form-group">
<label for="username">Nombre de Usuario</label>
<input type="text" id="username" name="username" disabled />
<small class="form-help">No se puede modificar</small>
</div>
<div class="form-actions">
<button type="button" class="btn btn--secondary" id="btn-cancel">Cancelar</button>
<button type="submit" class="btn btn--primary" id="btn-save">Guardar Cambios</button>
</div>
</form>
</section>

<section class="profile-section">
<h2>Seguridad</h2>
<form id="password-form">
<div class="form-group">
<label for="current-password">Contraseña Actual</label>
<input type="password" id="current-password" name="current_password" required />
</div>
<div class="form-group">
<label for="new-password">Nueva Contraseña</label>
<input type="password" id="new-password" name="new_password" required minlength="8" />
<small class="form-help">Mínimo 8 caracteres</small>
</div>
<div class="form-group">
<label for="confirm-password">Confirmar Contraseña</label>
<input type="password" id="confirm-password" name="confirm_password" required />
</div>
<div class="form-actions">
<button type="submit" class="btn btn--danger">Cambiar Contraseña</button>
</div>
</form>
</section>
</main>

<div id="toast" class="toast" role="alert" aria-live="assertive"></div>

<script src="/resources/js/shared.js"></script>
<script src="/resources/js/profile.js"></script>
</body>
</html>
