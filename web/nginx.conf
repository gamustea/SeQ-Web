server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy routes ──────────────────────────────────────────
    # Exact paths (no trailing slash) needed by SPA fetch() calls
    location = /users  { proxy_pass http://seq:5000/users;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /system { proxy_pass http://seq:5000/system; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # Sub-path API endpoints (trailing slash)
    location /users/    { proxy_pass http://seq:5000/users/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /system/   { proxy_pass http://seq:5000/system/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /oauth/    { proxy_pass http://seq:5000/oauth/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /sentinel/ { proxy_pass http://seq:5000/sentinel/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /aegis/    { proxy_pass http://seq:5000/aegis/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /acheron/  { proxy_pass http://seq:5000/acheron/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /pages/    { proxy_pass http://seq:5000/pages/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── SPA fallback ──────────────────────────────────────────────
    # Ship index.html for any unknown path; Vue Router handles the rest.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
